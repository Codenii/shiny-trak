<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shiny Trak Overlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 12px;
        }

        #hunts {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hunt-card {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(13, 11, 26, 0.88);
            border: 1px solid rgba(114, 9, 183, 0.5);
            border-radius: 12px;
            padding: 10px 18px;
            box-shadow: 0 0 16px rgba(114, 9, 183, 0.25), 0 2px 8px rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: fit-content;
        }

        .sparkle { font-size: 18px; line-height: 1; }

        .sprite {
            width: 64px;
            height: 64px;
            image-rendering: auto;
            object-fit: contain;
            transform: scale(2);
            margin: 0 8px;
        }

        .hunt-name {
            color: #4CC9F0;
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
        }

        .separator { color: rgba(148, 163, 184, 0.5); font-size: 13px; }

        .hunt-count {
            color: #fbbf24;
            font-size: 26px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
            min-width: 7ch;
            display: inline-block;
        }

        .hunt-odds {
            color: #A78BFA;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        @keyframes count-flash {
            0%      { color: #fbbf24; transform: scale(1); }
            40%     { color: #ffffff; transform: scale(1.15); }
            100%    { color: #fbbf24; transform: scale(1); }
        }

        .count-flash { animation: count-flash 0.35s ease; }
    </style>
</head>
<body>
    <div id="hunts"></div>

    <script>
        let prevCounts = {};

        const OVERLAY_ID = "{{ overlay_id }}";

        function renderHunts(hunts, overlays) {
            const overlay = overlays.find(o => o.id === OVERLAY_ID);
            if (!overlay) return;

            const visibleIds = new Set(
                overlay.hunts.filter(h => h.visible).map(h => h.huntId)
            );

            const filtered = hunts.filter(h =>
                (h.status === 'active' || !h.status) && visibleIds.has(h.id)
            )
            const container = document.getElementById('hunts');
            const newCounts = {};
            filtered.forEach(h => { newCounts[h.id] = h.count; });

            container.innerHTML = '';

            filtered.forEach(hunt => {
                const card = document.createElement('div');
                card.className = 'hunt-card';

                // Sparkle
                const sparkle = document.createElement('span')
                sparkle.className = 'sparkle';
                sparkle.textContent = '✨';
                card.appendChild(sparkle);

                // Sprite (full mode only)
                if (overlay.elements.sprite === true && hunt.spriteUrl) {
                    const img = document.createElement('img');
                    img.className = 'sprite';
                    img.src = hunt.spriteUrl;
                    img.alt = hunt.displayName;
                    img.onerror = () => img.style.display = 'none';
                    card.appendChild(img);
                }

                // Name (name + full modes)
                if (overlay.elements.name === true) {
                    const name = document.createElement('span');
                    name.className = 'hunt-name';
                    name.textContent = hunt.displayName;
                    card.appendChild(name);

                    const sep = document.createElement('span');
                    sep.className = 'separator';
                    sep.textContent = '·';
                    card.appendChild(sep);
                }

                // Count
                if (overlay.elements.count === true) {
                    const countEl = document.createElement('span');
                    countEl.className = 'hunt-count';
                    countEl.textContent = hunt.count.toLocaleString('en-US');
                
                    // Flash animation if count changed
                    if (prevCounts[hunt.id] !== undefined && prevCounts[hunt.id] !== hunt.count) {
                        countEl.classList.add('count-flash');
                        countEl.addEventListener('animationend', () => {
                            countEl.classList.remove('count-flash');
                        }, { once: true });
                    }

                    card.appendChild(countEl);
                }

                // Odds
                if (overlay.elements.odds === true && hunt.encounterRate) {
                    const sep2 = document.createElement('span');
                    sep2.className = 'separator';
                    sep2.textContent = '·';
                    card.appendChild(sep2);

                    const oddsEl = document.createElement('span');
                    oddsEl.className = 'hunt-odds';
                    oddsEl.textContent = `1/${hunt.encounterRate.toLocaleString('en-US')}`;
                    card.appendChild(oddsEl);
                }
                container.appendChild(card);
            });

            prevCounts = newCounts;
        }

        function connect() {
            const es = new EventSource('/events');
            es.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.hunts && data.overlays) renderHunts(data.hunts, data.overlays);
                } catch (err) {
                    console.error('Parse error:', err);
                }
            };
            es.onerror = () => {
                es.close();
                setTimeout(connect, 3000);
            };
        }

        connect();
    </script>
</body>
</html>
