<div x-show="detailHunt !== null" class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <div
        class="px-6 py-4 border-b border-primary/10 bg-bg-surface/50 flex items-center gap-3"
    >
        <button
            @click="closeDetail()"
            class="flex items-center gap-1.5 text-sm text-text-muted hover:text-text transition-colors duration-150"
        >
            <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 19l-7-7 7-7"
                />
            </svg>
            <span
                x-text="detailFromTab === 'history' ? 'History' : 'Hunts'"
            ></span>
        </button>
    </div>
    <!-- Content -->
    <div class="flex-1 overflow-y-auto px-6 py-6">
        <template x-if="detailHunt">
            <div class="max-w-lg space-y-4">
                <!-- Hunt Header Card -->
                <div class="bg-bg-card rounded-xl p-5 flex items-center gap-5">
                    <div
                        class="flex-shrink-0 w-20 h-20 flex items-center justify-center"
                    >
                        <template x-if="detailHunt.spriteUrl">
                            <img
                                :src="detailHunt.spriteUrl"
                                :alt="detailHunt.displayName"
                                class="w-20 h-20 object-contain"
                                style="image-rendering: pixelated"
                            />
                        </template>
                        <template x-if="!detailHunt.spriteUrl">
                            <div
                                class="w-16 h-16 rounded-xl bg-primary/10 border border-primary/20 flex items-center justify-center text-3xl"
                            >
                                ✨
                            </div>
                        </template>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div
                            class="text-xl font-bold text-text"
                            x-text="detailHunt.displayName"
                        ></div>
                        <div class="flex items-center gap-2 mt-1">
                            <span
                                x-show="detailHunt.game"
                                class="text-sm text-text-muted"
                                x-text="detailHunt.game"
                            ></span>
                            <span
                                class="text-xs font-medium px-2 py-0.5 rounded-full border"
                                :class="detailHunt.status === 'completed' ? 'bg-gold/10 text-gold border-gold/30' : 'bg-primary/10 text-primary border-primary/30'"
                                x-text="detailHunt.status === 'completed' ? 'Completed' : 'Active'"
                            ></span>
                        </div>
                        <div class="mt-2">
                            <input
                                type="number"
                                :value="detailHunt.count || 0"
                                @change="setCount(detailHunt.id, $event.target.value)"
                                data-testid="detail-count"
                                class="w-28 bg-transparent text-gold font-bold text-3xl tabular-nums focus:outline-none focus:bg-bg-surface rounded-lg px-1"
                            />
                            <div class="text-xs text-text-muted/50">
                                encounters
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Dates -->
                <div class="bg-bg-card rounded-xl p-4 space-y-3">
                    <div
                        class="text-xs font-medium text-text-muted uppercase tracking-wider"
                    >
                        Dates
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-text-muted w-20 flex-shrink-0"
                            >Start</span
                        >
                        <input
                            type="date"
                            data-testid="detail-start-date"
                            :value="tsToDateInput(detailHunt.startDate)"
                            @change="updateHuntDate(detailHunt.id, 'startDate', $event.target.value)"
                            class="bg-bg-surface border border-primary/20 rounded-lg px-3 py-1.5 text-sm text-text focus:outline-none focus:border-primary/60 transition-colors duration-150"
                        />
                        <span
                            class="text-xs text-text-muted/50"
                            x-text="huntDuration(detailHunt)"
                        ></span>
                    </div>
                    <div
                        x-show="detailHunt.status === 'completed'"
                        class="flex items-center gap-3"
                    >
                        <span class="text-sm text-text-muted w-20 flex-shrink-0"
                            >End</span
                        >
                        <input
                            type="date"
                            data-testid="detail-end-date"
                            :value="detailHunt.endDate ? tsToDateInput(detailHunt.endDate) : ''"
                            @change="updateHuntDate(detailHunt.id, 'endDate', $event.target.value)"
                            class="bg-bg-surface border border-primary/20 rounded-lg px-3 py-1.5 text-sm text-text focus:outline-none focus:border-primary/60 transition-colors duration-150"
                        />
                    </div>
                </div>
                <!-- Hotkeys (active hunts only) -->
                <div
                    x-show="detailHunt.status !== 'completed'"
                    class="bg-bg-card rounded-xl p-4 space-y-2"
                >
                    <div
                        class="text-xs font-medium text-text-muted uppercase tracking-wider"
                    >
                        Hotkeys
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-text-muted w-20 flex-shrink-0"
                            >Increment</span
                        >
                        <span
                            x-show="detailHunt.hotkey"
                            class="px-1.5 py-0.5 bg-gold/10 border border-gold/30 rounded text-xs text-gold font-mono"
                            x-text="detailHunt.hotkey ? formatHotkey(detailHunt.hotkey) : ''"
                        ></span>
                        <span
                            x-show="!detailHunt.hotkey"
                            class="text-xs text-text-muted/40"
                            >Not set</span
                        >
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-text-muted w-20 flex-shrink-0"
                            >Decrement</span
                        >
                        <span
                            x-show="detailHunt.hotkeyDecrement"
                            class="px-1.5 py-0.5 bg-gold/10 border border-gold/30 rounded text-xs text-gold font-mono"
                            x-text="detailHunt.hotkeyDecrement ? formatHotkey(detailHunt.hotkeyDecrement) : ''"
                        ></span>
                        <span
                            x-show="!detailHunt.hotkeyDecrement"
                            class="text-xs text-text-muted/40"
                            >Not set</span
                        >
                    </div>
                </div>
                <!-- Notes -->
                <div class="bg-bg-card rounded-xl p-4">
                    <div
                        class="text-xs font-medium text-text-muted uppercase tracking-wider mb-3"
                    >
                        Notes
                    </div>
                    <textarea
                        :value="detailHunt.notes || ''"
                        @blur="updateNotes(detailHunt.id, $event.target.value)"
                        placeholder="Add notes about this hunt..."
                        rows="4"
                        class="w-full bg-bg-surface border border-primary/20 rounded-lg px-3 py-2 text-sm text-text placeholder-text-muted/30 focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/30 transition-colors duration-150 resize-none"
                    ></textarea>
                </div>
            </div>
        </template>
    </div>
</div>
