<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shiny Trak</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: {
                            DEFAULT: '#0D0B1A',
                            surface: '#130D28',
                            card: '#1A1035',
                        },
                        primary: {
                            DEFAULT: '#7209B7',
                            hover: '#560BAD',
                            light: '#B5179E',
                        },
                        accent: {
                            DEFAULT: '#4361EE',
                            light: '#4895EF',
                            muted: '#4CC9F0',
                        },
                        danger: {
                            DEFAULT: '#F72585',
                            hover: '#B5179E',
                        },
                        gold: '#FBBF24',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(114, 9, 183, 0.4); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(114, 9, 183, 0.7); }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        @keyframes listening-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .listening { animation: listening-pulse 1s ease-in-out infinite; }
    </style>
</head>
<body class="bg-bg text-white font-sans h-screen overflow-hidden flex" x-data="app()">
    <!-- Layout wrapper -->
    <div class="flex h-full w-full">
        <!-- Sidebar -->
        <aside class="w-56 flex-shrink-0 flex flex-col bg-bg-surface border-r border-white/5">
            <!-- Application Title -->
            <div class="px-5 py-5 border-b border-white/5">
                <div class="flex items-center gap-2.5">
                    <span class="text-xl">✨</span>
                    <div>
                        <div class="text-sm font-bold tracking-wide text-white">Shiny Trak</div>
                        <div class="text-xs text-accent-muted/60 font-medium" x-text="`${hunts.length} active hunt${hunts.length !== 1 ? 's' : ''}`"></div>
                    </div>
                </div>
            </div>
            <!-- Nav -->
            <nav class="flex-1 px-3 py-3 space-y-0.5">
                <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/20 border-l-2 border-primary cursor-default">
                    <svg class="w-4 h-4 text-primary-light flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <span class="text-sm font-medium text-white">Hunts</span>
                </div>
            </nav>

            <!-- Bottom Actions -->
            <div class="px-3 py-3 border-t border-white/5 space-y-0.5">
                <!-- Copy overlay URL -->
                <button
                    @click="copyOverlayUrl()"
                    class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left text-accent-muted/70 hover:text-accent-muted hover:bg-white/5 transition-colors duration-150"
                >
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                    </svg>
                    <span class="text-sm font-medium" x-text="overlayUrlCopied ? 'Copied!' : 'Copy Overlay URL'"></span>
                </button>

                <!-- Settings -->
                <button
                    @click="showSettings = true"
                    class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left text-accent-muted/70 hover:text-accent-muted hover:bg-white/5 transition-colors duration-150"
                >
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="text-sm font-medium">Settings</span>
                </button>

                <!-- Quit -->
                <button
                    @click="quit()"
                    class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left text-danger/60 hover:text-danger hover:bg-danger/10 transition-colors duration-150"
                >
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    <span class="text-sm font-medium">Quit</span>
                </button>
            </div>
        </aside>
        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Add Hunt Form -->
            <div class="px-6 py-4 border-b border-white/5 bg-bg-surface/50">
                <div class="flex items-end gap-3">
                    <!-- Pokemon Search -->
                    <div class="flex-1 max-w-xs">
                        <label class="block text-xs font-medium text-accent-muted/70 mb-1.5 uppercase tracking-wider">Pokemon</label>
                        <div class="relative">
                            <input
                                type="text"
                                x-model="newHunt.name"
                                @input="updateAutocomplete()"
                                @keydown.arrow-down.prevent="acHighlight = Math.min(acHighlight + 1, acOptions.length - 1)"
                                @keydown.arrow-up.prevent="acHighlight = Math.max(acHighlight - 1, 0)"
                                @keydown.enter.prevent="acHighlight >= 0 ? selectAc(acOptions[acHighlight]) : addHunt()"
                                @keydown.escape="acOptions = []"
                                @blur="setTimeout(() => acOptions = [], 150)"
                                @focus="updateAutocomplete()"
                                placeholder="Search Pokemon..."
                                autocomplete="off"
                                class="w-full bg-bg-card border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-white/20 focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/30 transition-colors duration-150"
                            />
                            <!-- Autocomplete dropdown -->
                            <div
                                x-show="acOptions.length > 0"
                                class="absolute top-full left-0 right-0 mt-1 bg-bg-card border border-white/10 rounded-lg overflow-hidden z-50 shadow-xl"
                            >
                                <template x-for="(option, index) in acOptions" :key="option">
                                    <div
                                        @mousedown.prevent="selectAc(option)"
                                        :class="index === acHighlight ? 'bg-primary/30 text-white' : 'text-white/80 hover:bg-white/5'"
                                        class="px-3 py-2 text-sm cursor-pointer transition-colors duration-100"
                                        x-text="option"
                                    ></div>
                                </template>
                            </div>
                        </div>
                    </div>
                    <!-- Display Mode -->
                    <div>
                        <label class="block text-xs font-medium text-accent-muted/70 mb-1.5 uppercase tracking-wider">Display</label>
                        <select
                            x-model="newHunt.mode"
                            class="bg-bg-card border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-primary/60 transition-colors duration-150 cursor-pointer"
                        >
                            <option value="full">Full</option>
                            <option value="name">Name</option>
                            <option value="counter">Counter</option>
                        </select>
                    </div>
                    <!-- Add Button -->
                    <button
                        @click="addHunt()"
                        :disabled="newHunt.loading || !newHunt.name.trim()"
                        class="flex items-center gap-2 px-4 py-2 bg-primary hover:bg-primary-hover disabled:opacity-40 disabled:cursor-not-allowed rounded-lg text-sm font-semibold text-white transition-colors duration-150"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span x-text="newHunt.loading ? 'Adding...' : 'Add Hunt'"></span>
                    </button>
                </div>
                <!-- Error Message -->
                <p
                    x-show="newHunt.error"
                    x-text="newHunt.error"
                    class="mt-2 text-xs text-danger"
                ></p>
            </div>
            <!-- Hunt List -->
            <div class="flex-1 overflow-y-auto px-6 py-4 space-y-2">
                <!-- Empty State -->
                <div
                    x-show="hunts.length === 0"
                    class="flex flex-col items-center justify-center h-full text-center py-16"
                >
                    <div class="text-5xl mb-4">✨</div>
                    <div class="text-white/40 text-sm font-medium">No active hunts</div>
                    <div class="text-white/20 text-xs mt-1">Search for a Pokemon above to get started</div>
                </div>
                <!-- Hunt Cards -->
                <template x-for="hunt in hunts" :key="hunt.id">
                    <div class="bg-bg-card border border-white/8 rounded-xl p-4 flex items-center gap-4 hover:border-white/15 transition-colors duration-150">
                        <!-- Sprite -->
                        <div class="flex-shrink-0 w-12 h-12 flex items-center justify-center">
                            <template x-if="hunt.spriteUrl">
                                <img :src="hunt.spriteUrl" :alt="hunt.displayName" class="w-12 h-12 object-contain" style="image-rendering: pixelated;" />
                            </template>
                            <template x-if="!hunt.spriteUrl">
                                <div class="w-10 h-10 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center text-lg">✨</div>
                            </template>
                        </div>
                        <!-- Name + Mode -->
                        <div class="flex-shrink-0 w-36">
                            <div class="text-sm font-semibold text-white truncate" x-text="hunt.displayName"></div>
                            <select
                                :value="hunt.displayMode"
                                @change="updateMode(hunt.id, $event.target.value)"
                                class="mt-1 bg-bg-surface border border-white/10 rounded px-2 py-0.5 text-xs text-accent-muted/70 focus:outline-none focus:border-primary/50 cursor-pointer"
                            >
                                <option value="full">Full</option>
                                <option value="name">Name</option>
                                <option value="counter">Counter</option>
                            </select>
                        </div>
                        <!-- Hotkeys -->
                        <div class="flex-1 flex gap-3">
                            <!-- Increment Hotkey -->
                            <div class="flex items-center gap-1.5">
                                <span class="text-xs text-white/30 font-medium">+</span>
                                <template x-if="capture.huntId === hunt.id && capture.field === 'hotkey'">
                                    <div class="flex items-center gap-1.5">
                                        <span class="text-xs text-accent-muted listening">Press a key...</span>
                                        <button @click="cancelCapture()" class="text-xs text-white/30 hover:text-white/60 transition-colors">✕</button>
                                    </div>
                                </template>
                                <template x-if="!(capture.huntId === hunt.id && capture.field === 'hotkey')">
                                    <div class="flex items-center gap-1">
                                        <template x-if="hunt.hotkey">
                                            <span class="px-1.5 py-0.5 bg-bg-surface border border-white/10 rounded text-xs text-gold font-mono" x-text="formatHotkey(hunt.hotkey)"></span>
                                        </template>
                                        <template x-if="hunt.hotkey">
                                            <button @click="clearHotkey(hunt.id, 'hotkey')" class="text-white/20 hover:text-danger/70 transition-colors text-xs">✕</button>
                                        </template>
                                        <button
                                            @click="startCapture(hunt.id, 'hotkey')"
                                            class="px-2 py-0.5 bg-bg-surface border border-white/10 hover:border-primary/40 rounded text-xs text-white/40 hover:text-white/70 transition-colors duration-150"
                                            x-text="hunt.hotkey ? 'Change' : 'Set'"
                                        ></button>
                                    </div>
                                </template>
                            </div>
                            <!-- Decrement Hotkey -->
                            <div class="flex items-center gap-1.5">
                                <span class="text-xs text-white/30 font-medium">-</span>
                                <template x-if="capture.huntId === hunt.id && capture.field === 'hotkeyDecrement'">
                                    <div class="flex items-center gap-1.5">
                                        <span class="text-xs text-accent-muted listening">Press a key...</span>
                                        <button @click="cancelCapture()" class="text-xs text-white/30 hover:text-white/60 transition-colors">✕</button>
                                    </div>
                                </template>
                                <template x-if="!(capture.huntId === hunt.id && capture.field === 'hotkeyDecrement')">
                                    <div class="flex items-center gap-1">
                                        <template x-if="hunt.hotkeyDecrement">
                                            <span class="px-1.5 py-0.5 bg-bg-surface border border-white/10 rounded text-xs text-gold font-mono" x-text="formatHotkey(hunt.hotkeyDecrement)"></span>
                                        </template>
                                        <template x-if="hunt.hotkeyDecrement">
                                            <button @click="clearHotkey(hunt.id, 'hotkeyDecrement')" class="text-white/20 hover:text-danger/70 transition-colors text-xs">✕</button>
                                        </template>
                                        <button
                                            @click="startCapture(hunt.id, 'hotkeyDecrement')"
                                            class="px-2 py-0.5 bg-bg-surface border border-white/10 hover:border-primary/40 rounded text-xs text-white/40 hover:text-white/70 transition-colors duration-150"
                                            x-text="hunt.hotkeyDecrement ? 'Change' : 'Set'"
                                        ></button>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <!-- Counter -->
                        <div class="flex-shrink-0 flex items-center gap-1.5">
                            <button
                                @click="decrement(hunt.id)"
                                class="w-7 h-7 flex items-center justify-center rounded-lg bg-bg-surface border border-white/10 hover:border-primary/40 hover:bg-primary/10 text-white/60 hover:text-white transition-colors duration-150 text-lg leading-none"
                            >-</button>
                            <input
                                type="number"
                                :value="hunt.count"
                                @change="setCount(hunt.id, $event.target.value)"
                                class="w-20 text-center bg-transparent text-gold font-bold text-lg tabular-nums focus:outline-none focus:bg-bg-surface rounded px-1"
                            />
                            <button
                                @click="increment(hunt.id)"
                                class="w-7 h-7 flex items-center justify-center rounded-lg bg-bg-surface border border-white/10 hover:border-primary/40 hover:bg-primary/10 text-white/60 hover:text-white transition-colors duration-150 text-lg leading-none"
                            >+</button>
                        </div>
                        <!-- Actions -->
                        <div class="flex-shrink-0 flex items-center gap-1">
                            <!-- Reset -->
                            <button
                                @click="resetHunt(hunt.id)"
                                title="Reset count"
                                class="w-7 h-7 flex items-center justify-center rounded-lg text-white/25 hover:text-white/60 hover:bg-white/5 transition-colors duration-150"
                            >
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                            </button>
                            <!-- Delete -->
                            <button
                                @click="deleteHunt(hunt.id)"
                                title="Delete Hunt"
                                class="w-7 h-7 flex items-center justify-center rounded-lg text-white/25 hover:text-danger hover:bg-danger/10 transition-colors duration-150"
                            >
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>
    <!-- Close dialog modal -->
    <div
        x-show="showCloseDialog"
        x-transition.opacity
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
    >
        <div class="bg-bg-surface border border-white/10 rounded-2xl p-6 w-80 shadow-2xl">
            <div class="text-base font-semibold text-white mb-1">Close Shiny Trak?</div>
            <div class="text-sm text-white/40 mb-5">What would you like to do?</div>
            <div class="flex flex-col gap-2">
                <button
                    @click="confirmClose('minimize')"
                    class="w-full px-4 py-2.5 bg-primary/20 hover:bg-primary/30 border border-primary/30 rounded-lg text-sm font-medium text-white text-left transition-colors duration-150"
                >Minimize to tray</button>
                <button
                    @click="confirmClose('quit')"
                    class="w-full px-4 py-2.5 bg-danger/10 hover:bg-danger/20 border border-danger/20 rounded-lg text-sm font-medium text-danger text-left transition-colors duration-150"
                >Quit Shiny Trak</button>
                <button
                    @click="confirmClose('cancel')"
                    class="w-full px-4 py-2.5 hover:bg-white/5 rounded-lg text-sm font-medium text-white/40 hover:text-white/60 text-left transition-colors duration-150"
                >Cancel</button>
            </div>
        </div>
    </div>
    <!-- Settings Panel Modal -->
    <div
        x-show="showSettings"
        x-transition.opacity
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
        @click.self="showSettings = false"
    >
        <div class="bg-bg-surface border border-white/10 rounded-2xl p-6 w-96 shadow-2xl">
            <div class="flex items-center justify-between mb-5">
                <div class="text-base font-semibold text-white">Settings</div>
                <button @click="showSettings = false" class="text-white/30 hover:text-white/60 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <!-- Close Behavior -->
            <div>
                <div class="text-xs font-medium text-accent-muted/70 uppercase tracking-wider mb-3">When closing the window</div>
                <div class="space-y-1.5">
                    <template x-for="opt in [{value:'ask',label:'Ask every time'},{value:'minimize',label:'Minimize to tray'},{value:'quit',label:'Quit'}]" :key="opt.value">
                        <label class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/5 cursor-pointer transition-colors duration-150">
                            <input
                                type="radio"
                                name="close_behavior"
                                :value="opt.value"
                                x-model="settings.close_behavior"
                                @change="saveSettings()"
                                class="accent-primary"
                            />
                            <span class="text-sm text-white/80" x-text="opt.label"></span>
                        </label>
                    </template>
                </div>
            </div>
        </div>
    </div>
    <script>
        function app() {
            return {
                hunts: [],
                pokemonNames: [],
                acOptions: [],
                acHighlight: -1,
                newHunt: { name: '', mode: 'full', error: '', loading: false },
                capture: { huntId: null, field: null },
                settings: { close_behavior: 'ask' },
                showCloseDialog: false,
                showSettings: false,
                overlayUrlCopied: false,
                _captureListener: null,

                // Lifecycle
                async init() {
                    const s = await fetch('/api/settings').then(r => r.json())
                    this.settings = s
                    fetch('/api/pokemon-list').then(r => r.json()).then(names => {
                        this.pokemonNames = names
                    })
                    this.connect()
                    window.addEventListener('show-close-dialog', () => {
                        this.showCloseDialog = true
                    })
                },

                connect() {
                    const es = new EventSource('/events')
                    es.onmessage = (e) => {
                        const data = JSON.parse(e.data)
                        if (data.hunts) this.hunts = data.hunts
                    }
                    es.onerror = () => {
                        es.close()
                        setTimeout(() => this.connect(), 3000)
                    }
                },

                // Autocomplete
                updateAutocomplete() {
                    const q = this.newHunt.name.toLowerCase().trim()
                    if (!q) { this.acOptions = []; this.acHighlight = -1; return }
                    this.acOptions = this.pokemonNames.filter(n => n.startsWith(q)).slice(0, 8)
                    this.acHighlight = -1
                },

                selectAc(option) {
                    this.newHunt.name = option
                    this.acOptions = []
                    this.acHighlight = -1
                },

                // Hunt operations
                async addHunt() {
                    const name = this.newHunt.name.trim()
                    if (!name) return
                    this.newHunt.loading = true
                    this.newHunt.error = ''
                    try {
                        const pokemon = await fetch(`/api/pokemon/${encodeURIComponent(name)}`).then(r => r.json())
                        if (pokemon.error) { this.newHunt.error = pokemon.error; return }
                        await fetch('/api/hunts', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                pokemon: pokemon.pokemon,
                                displayName: pokemon.displayName,
                                spriteUrl: pokemon.spriteUrl,
                                displayMode: this.newHunt.mode,
                            })
                        })
                        this.newHunt.name = ''
                        this.acOptions = []
                    } catch {
                        this.newHunt.error = 'Failed to add hunt'
                    } finally {
                        this.newHunt.loading = false
                    }
                },

                async deleteHunt(id) {
                    await fetch(`/api/hunts/${id}`, { method: 'DELETE' })
                },
                
                async resetHunt(id) {
                    await fetch(`/api/hunts/${id}/reset`, { method: 'POST' })
                },

                async updateMode(id, mode) {
                    await fetch(`/api/hunts/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ displayMode: mode })
                    })
                },

                async increment(id) {
                    await fetch(`/api/hunts/${id}/increment`, { method: 'POST' })
                },

                async decrement(id) {
                    await fetch(`/api/hunts/${id}/decrement`, { method: 'POST'} )
                },

                async setCount(id, value) {
                    const count = parseInt(value)
                    if (isNaN(count)) return
                    await fetch(`/api/hunts/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json'},
                        body: JSON.stringify({ count })
                    })
                },

                // Hotkey capture
                startCapture(huntId, field) {
                    this.capture = { huntId, field }
                    this._captureListener = (e) => this.onCaptureKey(e)
                    document.addEventListener('keydown', this._captureListener)
                },

                onCaptureKey(e) {
                    e.preventDefault()
                    const key = this.keyToPynput(e)
                    if (!key) return
                    document.removeEventListener('keydown', this._captureListener)
                    this._captureListener = null
                    const { huntId, field } = this.capture
                    this.capture = { huntId: null, field: null }
                    fetch(`/api/hunts/${huntId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ [field]: key })
                    })
                },

                cancelCapture() {
                    if (this._captureListener) {
                        document.removeEventListener('keydown', this._captureListener)
                        this._captureListener = null
                    }
                    this.capture = { huntId: null, field: null }
                },

                clearHotkey(id, field) {
                    fetch(`/api/hunts/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ [field]: null })
                    })
                },

                keyToPynput(e) {
                    const SPECIAL = {
                        'F1':'<f1>','F2':'<f2>','F3':'<f3>','F4':'<f4>',
                        'F5':'<f5>','F6':'<f6>','F7':'<f7>','F8':'<f8>',
                        'F9':'<f9>','F10':'<f10>','F11':'<f11>','F12':'<f12>',
                        'ArrowUp':'<up>','ArrowDown':'<down>','ArrowLeft':'<left>','ArrowRight':'<right>',
                        'Enter':'<enter>','Escape':'<esc>',' ':'<space>','Tab':'<tab>',
                        'Backspace':'<backspace>','Delete':'<delete>','Insert':'<insert>',
                        'Home':'<home>','End':'<end>','PageUp':'<page_up>','PageDown':'<page_down>',
                    }
                    if (['Control', 'Shift', 'Alt', 'Meta'].includes(e.key)) return null
                    const mods = []
                    if (e.ctrlKey) mods.push('<ctrl>')
                    if (e.shiftKey) mods.push('<shift>')
                    if (e.altKey) mods.push('<alt>')
                    if (e.metaKey) mods.push('<cmd>')
                    const key = SPECIAL[e.key] || e.key.toLowerCase()
                    return [...mods, key].join('+')
                },

                formatHotkey(hotkey) {
                    if (!hotkey) return ''
                    const MAP = {
                        '<ctrl>':'Ctrl','<shift>':'Shift','<alt>':'Alt','<cmd>':'Cmd',
                        '<f1>':'F1','<f2>':'F2','<f3>':'F3','<f4>':'F4',
                        '<f5>':'F5','<f6>':'F6','<f7>':'F7','<f8>':'F8',
                        '<f9>':'F9','<f10>':'F10','<f11>':'F11','<f12>':'F12',
                        '<up>':'↑','<down>':'↓','<left>':'←','<right>':'→',
                        '<enter>':'Enter','<esc>':'Esc','<space>':'Space','<tab>':'Tab',
                        '<backspace>':'Backspace','<delete>':'Delete','<insert>':'Insert',
                        '<home>':'Home','<end>':'End','<page_up>':'PgUp','<page_down>':'PgDn',
                    }
                    return hotkey.split('+').map(p => MAP[p] || p.toUpperCase()).join('+')
                },

                // Settings
                async saveSettings() {
                    await fetch('/api/settings', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.settings)
                    })
                },

                // Close Behavior
                async confirmClose(action) {
                    this.showCloseDialog = false
                    await fetch('/api/close-action', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action })
                    })
                },

                quit() { this.confirmClose('quit') },

                async copyOverlayUrl() {
                    await navigator.clipboard.writeText('http://localhost:3000/overlay')
                    this.overlayUrlCopied = true
                    setTimeout(() => this.overlayUrlCopied = false, 2000)
                },
            }
        }
    </script>
</body>
</html>
